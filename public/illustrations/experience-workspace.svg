<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none" role="img" aria-label="Developer workspace illustration">
  <defs>
    <linearGradient id="glowPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="glowPink" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="laptopShell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="keyboard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2563eb" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle cx="120" cy="90" r="72" fill="url(#glowPurple)"/>
  <circle cx="400" cy="110" r="58" fill="url(#glowPink)"/>
  <circle cx="430" cy="330" r="42" fill="url(#glowPurple)"/>

  <g opacity="0.35">
    <path d="M60 360h400" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 8"/>
    <rect x="78" y="342" width="14" height="14" rx="2" stroke="#f97316" stroke-width="2"/>
    <rect x="428" y="342" width="14" height="14" rx="2" stroke="#1e40af" stroke-width="2"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="300" y="48" width="168" height="108" rx="14" fill="url(#cardBg)" stroke="#3b82f6" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle cx="318" cy="66" r="5" fill="#f87171"/>
    <circle cx="334" cy="66" r="5" fill="#fbbf24"/>
    <circle cx="350" cy="66" r="5" fill="#34d399"/>
    <text x="316" y="92" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="11">experience.map()</text>
    <text x="316" y="110" fill="#3b82f6" font-family="ui-monospace, monospace" font-size="11">  role: &apos;dev&apos;</text>
    <text x="316" y="128" fill="#fb923c" font-family="ui-monospace, monospace" font-size="11">  stack: [</text>
    <text x="328" y="146" fill="#34d399" font-family="ui-monospace, monospace" font-size="11">&apos;React&apos;, &apos;Next&apos;</text>
  </g>

  <g transform="translate(58 88)">
    <ellipse cx="190" cy="250" rx="175" ry="22" fill="#0f172a" fill-opacity="0.65"/>
    <ellipse cx="190" cy="250" rx="140" ry="14" fill="#2563eb" fill-opacity="0.18"/>

    <path d="M40 210 L340 210 L360 228 L20 228 Z" fill="url(#keyboard)" stroke="#3b82f6" stroke-opacity="0.5"/>
    <rect x="55" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.35"/>
    <rect x="80" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.25"/>
    <rect x="105" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.35"/>
    <rect x="130" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.25"/>
    <rect x="155" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.35"/>
    <rect x="180" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.25"/>
    <rect x="205" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.35"/>
    <rect x="230" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.25"/>
    <rect x="255" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.35"/>
    <rect x="280" y="218" width="18" height="4" rx="2" fill="#93c5fd" fill-opacity="0.25"/>

    <rect x="70" y="20" width="240" height="168" rx="16" fill="url(#laptopShell)" stroke="#60a5fa" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="86" y="36" width="208" height="132" rx="10" fill="url(#screenBg)" stroke="#2563eb" stroke-opacity="0.35"/>
    <rect x="168" y="28" width="44" height="6" rx="3" fill="#1e293b"/>

    <text x="100" y="64" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="12">function build() {</text>
    <text x="112" y="84" fill="#3b82f6" font-family="ui-monospace, monospace" font-size="12">const app =</text>
    <text x="112" y="104" fill="#34d399" font-family="ui-monospace, monospace" font-size="12">&apos;portfolio&apos;;</text>
    <text x="100" y="124" fill="#fb923c" font-family="ui-monospace, monospace" font-size="12">return ship(app);</text>
    <text x="100" y="144" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="12">}</text>

    <rect x="118" y="152" width="64" height="5" rx="2.5" fill="#2563eb" fill-opacity="0.8"/>
  </g>

  <g transform="translate(36 250)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.4"/>
    <path d="M20 42 L32 22 L44 42 Z" fill="#2563eb"/>
