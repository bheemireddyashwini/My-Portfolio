    <rect x="155" y="218" width="18" height="4" rx="2" fill="#c4b5fd" fill-opacity="0.35"/>
    <rect x="180" y="218" width="18" height="4" rx="2" fill="#c4b5fd" fill-opacity="0.25"/>
    <rect x="205" y="218" width="18" height="4" rx="2" fill="#c4b5fd" fill-opacity="0.35"/>
    <rect x="230" y="218" width="18" height="4" rx="2" fill="#c4b5fd" fill-opacity="0.25"/>
    <rect x="255" y="218" width="18" height="4" rx="2" fill="#c4b5fd" fill-opacity="0.35"/>
    <rect x="280" y="218" width="18" height="4" rx="2" fill="#c4b5fd" fill-opacity="0.25"/>

    <rect x="70" y="20" width="240" height="168" rx="16" fill="url(#laptopShell)" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="86" y="36" width="208" height="132" rx="10" fill="url(#screenBg)" stroke="#a855f7" stroke-opacity="0.35"/>
    <rect x="168" y="28" width="44" height="6" rx="3" fill="#581c87"/>

    <text x="100" y="64" fill="#a78bfa" font-family="ui-monospace, monospace" font-size="12">function build() {</text>
    <text x="112" y="84" fill="#f472b6" font-family="ui-monospace, monospace" font-size="12">const app =</text>
    <text x="112" y="104" fill="#34d399" font-family="ui-monospace, monospace" font-size="12">&apos;portfolio&apos;;</text>
    <text x="100" y="124" fill="#fb923c" font-family="ui-monospace, monospace" font-size="12">return ship(app);</text>
    <text x="100" y="144" fill="#a78bfa" font-family="ui-monospace, monospace" font-size="12">}</text>

    <rect x="118" y="152" width="64" height="5" rx="2.5" fill="#7c3aed" fill-opacity="0.8"/>
  </g>

  <g transform="translate(36 250)">
