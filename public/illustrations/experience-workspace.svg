    <rect x="8" y="8" width="36" height="14" rx="7" fill="#8b5cf6"/>
    <circle cx="26" cy="48" r="9" fill="#fbbf24"/>
    <path d="M21 48c2-3 8-3 10 0s-8 3-10 0z" fill="#6b21a8" fill-opacity="0.35"/>
